<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变：深蓝 → 紫 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="50%"  stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- 光晕效果 -->
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <!-- 圆角矩形裁剪 -->
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>
  <!-- 光晕层 -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#glowGrad)"/>

  <!-- 字母 N -->
  <text
    x="256"
    y="315"
    font-family="-apple-system, 'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="260"
    font-weight="800"
    text-anchor="middle"
    fill="white"
    letter-spacing="-4"
  >N</text>

  <!-- 终端光标下划线 -->
  <rect x="178" y="355" width="156" height="18" rx="9" fill="#22d3ee"/>

</svg>
