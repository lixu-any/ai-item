
name: "Nixu Release Build"

on:
  push:
    tags:
      - 'v*' # 只有当你推送形如 v1.0.2 的 tag 时才会触发

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows 构建任务
          - platform: 'windows-latest'
            args: ''
          # macOS Intel 构建任务
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          # macOS M系列芯片 (Apple Silicon) 构建任务
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          # Linux 构建任务 (如需去重也可删掉)
          - platform: 'ubuntu-20.04'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 针对 Linux 平台安装特有系统依赖
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      # 安装 Node.js
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 安装 Rust (使用最新的稳定版)
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # 对于 macOS 交叉编译需要添加特定的 target
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # 安装项目 NPM 依赖
      - name: install app dependencies
        run: npm install

      # 核心：使用 Tauri Action 执行真正的 build 打包
      # 它会自动拉取 tauri-cli 并运行 npm run tauri build
      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # 将当前版本号作为 Tag
          releaseName: 'Nixu v__VERSION__'
          releaseBody: '详见提交说明'
          releaseDraft: true     # 生成的 release 会以草稿状态存在，你可以手动检查后再发布
          prerelease: false
          args: ${{ matrix.args }}